name: Sniffline
options:
  bundleIdPrefix: com.shimondeitel.walkroute
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sniffline:
    type: application
    platform: iOS
    sources:
      - path: Sniffline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.walkroute
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sniffline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SnifflineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnifflineTests
      - path: Sniffline.storekit
    dependencies:
      - target: Sniffline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.walkroute.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SnifflineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SnifflineUITests
    dependencies:
      - target: Sniffline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.walkroute.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sniffline:
    build:
      targets:
        Sniffline: all
        SnifflineTests: [test]
        SnifflineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sniffline.storekit
    test:
      config: Debug
      storeKitConfiguration: Sniffline.storekit
      targets:
        - SnifflineTests
        - SnifflineUITests
    archive:
      config: Release
